databaseChangeLog:
  - changeSet:
      id: 1-create-users-table
      author: hibernate-to-liquibase
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_names
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_names
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: logins
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: passwords
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: birthdays
                  type: DATE
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-roles-table
      author: hibernate-to-liquibase
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: types
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 3-create-user-roles-join-table
      author: hibernate-to-liquibase
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_on_user
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_user_roles_on_role

  - changeSet:
      id: 4-create-categories-table
      author: hibernate-to-liquibase
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: names
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_categories_on_owner

  - changeSet:
      id: 5-create-notes-table-v2
      author: hibernate-to-liquibase
      changes:
        - createTable:
            tableName: notes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: date_added
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: shared
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notes
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_notes_on_owner

  - changeSet:
      id: 6-create-note-categories-join-table
      author: hibernate-to-liquibase
      changes:
        - createTable:
            tableName: note_categories
            columns:
              - column:
                  name: note_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: note_categories
            columnNames: note_id, category_id
            constraintName: pk_note_categories
        - addForeignKeyConstraint:
            baseTableName: note_categories
            baseColumnNames: note_id
            referencedTableName: notes
            referencedColumnNames: id
            constraintName: fk_note_categories_on_note
        - addForeignKeyConstraint:
            baseTableName: note_categories
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_note_categories_on_category