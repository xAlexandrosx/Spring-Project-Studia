<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar" class="navbar">
    <div class="logo" onclick="switchToDashboard()" style="cursor: pointer;">🗒️ Noted.</div>

    <div class="topbar-tabs" style="display: flex; align-items: center; gap: 15px; font-size: 15px; margin-left: 20px;">
        <span id="tab-my-notes" onclick="toggleDashboardTab('my')"
              style="font-weight: bold; border-bottom: 2px solid #008bf8; color: #2c3e50; cursor: pointer; padding-bottom: 4px;">
            My Notes
        </span>
        <span style="color: #bdc3c7;">|</span>
        <span id="tab-shared-notes" onclick="toggleDashboardTab('shared')"
              style="font-weight: normal; border-bottom: none; color: #7f8c8d; cursor: pointer; padding-bottom: 4px;">
            Shared Notes
        </span>
    </div>

    <div class="search-sort-container" id="navbar-search-sort">
        <div class="search-input-wrapper">
            <input type="text" id="global-search-bar" class="search-box" placeholder="Search notes by title or category..." oninput="handleSearchAndSortFilter()">
        </div>
        <select id="global-sort-select" class="sort-select" onchange="handleSearchAndSortFilter()">
            <option value="date-desc">Added: Newest First</option>
            <option value="date-asc">Added: Oldest First</option>
            <option value="title-asc">Title: A to Z</option>
            <option value="title-desc">Title: Z to A</option>
        </select>
    </div>
    <div class="nav-actions" style="display: flex; gap: 15px; align-items: center;">
        <button id="nav-new-note-btn" class="btn btn-success" onclick="openFreshNoteEditor()">+ New Note</button>
        <button id="delete-selected-btn" class="btn btn-danger" disabled onclick="deleteCheckedNotes()">Delete Notes</button>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>
</div>

<div th:fragment="category-manager(prefix)" class="notion-cat-container">
    <div class="notion-cat-label">Categories</div>

    <div class="notion-cat-pillbox"
         th:id="${prefix + '-pillbox'}"
         th:data-prefix="${prefix}"
         onclick="focusPillboxInput(this.getAttribute('data-prefix') + '-cat-input')">

        <input type="text" th:id="${prefix + '-cat-input'}" class="pillbox-input" placeholder="Select an option or create one..."
               th:data-dropdown-id="${prefix + '-dropdown'}"
               th:data-input-id="${prefix + '-cat-input'}"
               onclick="showNotionDropdown(this.getAttribute('data-dropdown-id'), this.getAttribute('data-input-id'))"
               oninput="filterNotionDropdown(this.getAttribute('data-dropdown-id'), this.value)">
    </div>

    <div class="notion-dropdown" th:id="${prefix + '-dropdown'}">
        <div class="notion-dropdown-header">Select an option or create one</div>
        <div class="options-list" th:id="${prefix + '-options-list'}"></div>
        <div class="notion-option notion-create-option" th:id="${prefix + '-create-btn'}" style="display:none;"></div>
    </div>
</div>

</body>
</html>
