<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="panel" id="details-view" class="view-panel" style="position: relative;">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
        <button id="back-btn" class="btn btn-secondary" onclick="switchToDashboard()">← Back to Dashboard</button>

        <button id="panel-share-btn" class="btn" style="background-color: #008bf8; color: white;" onclick="shareCurrentNote()">SHARE</button>
    </div>

    <div>
        <h1 id="panel-title" class="view-title">Note Title</h1>
        <div id="panel-title-hint" class="error-hint"></div>
    </div>
    <div id="panel-meta" class="view-meta">Created by ...</div>
    <div>
        <div id="panel-content" class="view-content">Note content block...</div>
        <div id="panel-content-hint" class="error-hint"></div>
    </div>

    <div th:replace="~{fragments/components :: category-manager(prefix='panel')}"></div>

    <div class="view-actions" style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; gap: 15px;">
            <button id="edit-save-btn" class="btn btn-primary" onclick="toggleEditMode()">Update Note</button>
            <button id="cancel-btn" class="btn btn-secondary" style="display: none;" onclick="cancelEditMode()">Cancel</button>
            <span id="shared-readonly-indicator" style="display: none; color: #7f8c8d; font-style: italic; font-size: 14px;">👁️ Shared Note (Read-Only)</span>
        </div>
        <div>
            <button id="view-delete-btn" class="btn btn-danger" onclick="deleteCurrentNote()">Delete</button>
        </div>
    </div>
</div>

</body>
</html>
