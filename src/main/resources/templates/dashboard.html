<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; color: #2c3e50; white-space: nowrap; }
        .search-sort-container { display: flex; align-items: center; gap: 12px; flex-grow: 1; max-width: 500px; margin: 0 30px; }
        .search-input-wrapper { position: relative; flex-grow: 1; }
        .search-box { width: 100%; padding: 10px 15px; border: 1px solid #d5dbdb; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; transition: 0.2s; }
        .search-box:focus { border-color: #008bf8; box-shadow: 0 0 0 2px rgba(0, 139, 248, 0.1); }
        .sort-select { padding: 9px 12px; border: 1px solid #d5dbdb; border-radius: 8px; font-size: 14px; background: white; color: #34495e; cursor: pointer; outline: none; transition: 0.2s; }
        .nav-actions { display: flex; gap: 15px; align-items: center; white-space: nowrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-danger:disabled { background: #d5dbdb; color: #7f8c8d; cursor: not-allowed; }
        .btn-secondary { background: #7f8c8d; color: white; }
        .btn-primary { background: #008bf8; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:hover { background: #27ae60; }
        .main-container { padding: 40px; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .card { width: 200px; height: 260px; border-radius: 20px; background: white; position: relative; padding: 1.5rem; border: 2px solid #c3c6ce; transition: 0.5s ease-out; overflow: visible; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .card-details { color: black; height: 100%; display: flex; flex-direction: column; gap: .5em; justify-content: flex-start; }
        .text-title { font-size: 1.3em; font-weight: bold; margin: 0; color: #2c3e50; word-break: break-word; outline: none; }
        .text-body-input { font-size: 0.95em; color: #555; outline: none; word-break: break-word; min-height: 80px; margin-top: 5px; }
        .text-author { color: #7f8c8d; font-size: 0.85em; margin: 2px 0; }
        .categories-wrapper { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; margin-bottom: 25px; }
        .category-badge { background: #ebf5fb; color: #2980b9; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .card-button { transform: translate(-50%, 125%); width: 70%; border-radius: 1rem; border: none; background-color: #008bf8; color: #fff; font-size: 0.9rem; padding: .5rem 1rem; position: absolute; left: 50%; bottom: 0; opacity: 0; transition: 0.3s ease-out; cursor: pointer; }
        .card:hover { border-color: #008bf8; box-shadow: 0 4px 18px 0 rgba(0, 0, 0, 0.15); }
        .card:hover .card-button { transform: translate(-50%, 50%); opacity: 1; }
        .card-creator { border: 2px dashed #008bf8; background: #fdfefe; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .card-creator:hover { background: #f4fafd; box-shadow: 0 4px 12px rgba(0, 139, 248, 0.15); }
        .creator-plus { font-size: 48px; color: #008bf8; font-weight: 300; display: block; margin-bottom: 5px; text-align: center; }
        .creator-label { font-size: 14px; font-weight: bold; color: #008bf8; text-align: center; }
        .note-checkbox { position: absolute; top: 15px; right: 15px; width: 18px; height: 18px; cursor: pointer; z-index: 10; opacity: 0; transition: opacity 0.2s; }
        .card:hover .note-checkbox, .note-checkbox:checked { opacity: 1; }
        .view-panel { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 700px; margin: 0 auto; display: none; }
        .view-title { font-size: 2em; margin-top: 0; color: #2c3e50; outline: none; transition: 0.2s; }
        .view-meta { color: #95a5a6; font-size: 0.9em; margin-bottom: 20px; }
        .view-content { font-size: 1.1em; line-height: 1.6; color: #34495e; min-height: 150px; margin-bottom: 30px; white-space: pre-wrap; outline: none; transition: 0.2s; }
        .view-actions { display: flex; gap: 15px; border-top: 1px solid #ecf0f1; padding-top: 20px; }
        .invalid-field { border: 2px dashed #e74c3c !important; background-color: #fdf2f2 !important; padding: 5px; border-radius: 6px; }
        .error-hint { color: #e74c3c; font-size: 12px; margin-top: 4px; font-weight: 500; display: block; }
        .notion-cat-container { margin: 20px 0; padding-top: 15px; border-top: 1px dashed #ecf0f1; position: relative; }
        .notion-cat-label { font-size: 0.85em; color: #7f8c8d; font-weight: 600; margin-bottom: 8px; }
        .notion-cat-pillbox { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; min-height: 34px; padding: 4px 8px; border: 1px solid #d5dbdb; border-radius: 8px; background: #fafbfc; cursor: text; }
        .notion-cat-pillbox:focus-within { border-color: #008bf8; background: white; box-shadow: 0 0 0 2px rgba(0, 139, 248, 0.1); }
        .pill-badge { background: #ebf5fb; color: #2980b9; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
        .pill-remove { cursor: pointer; color: #bdc3c7; font-weight: bold; font-size: 13px; transition: 0.1s; }
        .pill-remove:hover { color: #e74c3c; }
        .pillbox-input { border: none; outline: none; background: transparent; font-size: 13px; color: #333; flex-grow: 1; min-width: 120px; padding: 4px 0; }
        .notion-cat-pillbox.disabled-pillbox { background: #fcfdfd; border-color: #d5dbdb; cursor: default; }
        .notion-cat-pillbox.disabled-pillbox .pillbox-input, .notion-cat-pillbox.disabled-pillbox .pill-remove { display: none; }
        .notion-dropdown { position: absolute; top: 100%; left: 0; width: 280px; max-height: 250px; background: white; border: 1px solid #d5dbdb; border-radius: 10px; box-shadow: 0 6px 16px rgba(0,0,0,0.1); margin-top: 5px; overflow-y: auto; z-index: 999; display: none; }
        .notion-dropdown-header { padding: 8px 12px; font-size: 11px; color: #7f8c8d; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #f2f4f4; background: #fafbfc; }
        .notion-option { padding: 8px 12px; font-size: 13px; color: #34495e; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.15s; }
        .notion-option:hover { background: #f4f7f6; color: #008bf8; }
        .notion-option-check { font-weight: bold; color: #2ecc71; display: none; }
        .notion-option.active .notion-option-check { display: block; }
        .notion-create-option { border-top: 1px solid #f2f4f4; font-weight: 600; color: #008bf8 !important; }
        .notion-create-option span { background: #e8f4fd; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 4px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/components :: navbar}"></div>

<div class="main-container">
    <div id="dashboard-view">
        <div id="notes-grid" class="notes-grid">
            <p>Loading your vault...</p>
        </div>
    </div>

    <div th:replace="~{fragments/details-view :: panel}"></div>
</div>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
