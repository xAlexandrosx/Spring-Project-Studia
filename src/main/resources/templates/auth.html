<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noted - Welcome</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ecc71; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #27ae60; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 13px; color: #3498db; cursor: pointer; }
        .error-msg { color: #e74c3c; font-size: 14px; text-align: center; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">Login to Noted</h2>
    <div id="error" class="error-msg"></div>

    <form id="auth-form">
        <div class="form-group register-only" style="display: none;">
            <label>First Name</label>
            <input type="text" id="firstName">
        </div>
        <div class="form-group register-only" style="display: none;">
            <label>Last Name</label>
            <input type="text" id="lastName">
        </div>
        <div class="form-group register-only" style="display: none;">
            <label>Birthday (YYYY-MM-DD)</label>
            <input type="date" id="birthday">
        </div>

        <div class="form-group">
            <label>Username (Login)</label>
            <input type="text" id="login" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <div class="form-group register-only" style="display: none;">
            <label>Repeat Password</label>
            <input type="password" id="repeatPassword">
        </div>

        <button type="submit" id="submit-btn">Sign In</button>
    </form>

    <div class="toggle-link" id="toggle-view" onclick="toggleAuth()">Don't have an account? Register here</div>
</div>

<script>
    let isLoginMode = true;

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? 'Login to Noted' : 'Create an Account';
        document.getElementById('submit-btn').innerText = isLoginMode ? 'Sign In' : 'Sign Up';
        document.getElementById('toggle-view').innerText = isLoginMode ? "Don't have an account? Register here" : "Already have an account? Log In";

        const regFields = document.querySelectorAll('.register-only');
        regFields.forEach(field => field.style.display = isLoginMode ? 'none' : 'block');

        document.getElementById('repeatPassword').required = !isLoginMode;
        document.getElementById('firstName').required = !isLoginMode;
        document.getElementById('lastName').required = !isLoginMode;
        document.getElementById('birthday').required = !isLoginMode;

        document.getElementById('error').style.display = 'none';
    }

    document.getElementById('auth-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'none';

        const loginVal = document.getElementById('login').value;
        const passwordVal = document.getElementById('password').value;

        if (isLoginMode) {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: loginVal, password: passwordVal })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('jwt_token', data.token);

                try {
                    const base64Url = data.token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const payload = JSON.parse(window.atob(base64));

                    const roles = payload.roles || payload.authorities || [];
                    const userRoles = Array.isArray(roles) ? roles : [roles];

                    if (userRoles.includes('ROLE_ADMIN')) {
                        window.location.href = '/admin-panel';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } catch (e) {
                    console.error("Failed to parse token roles context", e);
                    window.location.href = '/dashboard';
                }
            } else {
                errorDiv.innerText = 'Invalid username or password';
                errorDiv.style.display = 'block';
            }
        } else {
            const payload = {
                login: loginVal,
                password: passwordVal,
                repeatPassword: document.getElementById('repeatPassword').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                birthday: document.getElementById('birthday').value
            };

            const response = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                toggleAuth();
            } else {
                const errData = await response.json().catch(() => ({}));
                errorDiv.innerText = errData.message || 'Registration failed. Check your inputs (Fields match/Constraints constraints).';
                errorDiv.style.display = 'block';
            }
        }
    });
</script>
</body>
</html>
