<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Noted - Organize Your Thoughts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'monospace';
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .welcome-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #eeecf9;
            color: var(--primary);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        p.subtitle {
            margin-bottom: 28px;
        }

        .cta-button {
            display: block;
            width: 100%;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            font-weight: 500;
            font-size: 16px;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        .cta-button:hover {
            background-color: var(--primary-hover);
        }

        .cta-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <div class="logo-icon">N</div>

    <h1>Welcome to Noted</h1>
    <p>Your minimalist, cloud-based personal knowledge hub.</p>
    <p class="subtitle">Seamlessly manage your daily thoughts, code snippets, and custom categories all in one secure sandbox.</p>

    <a th:href="@{/login}" class="cta-button">Get Started</a>
</div>

</body>
</html>
